# ============================================================================
# STF AI Diagnosis Platform - Docker Compose Configuration
# Author: Li-Ta Hsu
# Date: January 2026
# ============================================================================
# Local-first deployment for Phase 1 pilot
# All services bound to 127.0.0.1 for security
# No external LLM API calls - uses local Ollama inference
# ============================================================================

# ============================================================================
# NETWORKS - Internal-only communication, localhost exposure
# ============================================================================
networks:
  stf-internal:
    driver: bridge
    internal: false # Allows outbound for initial pulls, runtime egress controlled via SSRF proxy
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================================================
# VOLUMES - Named volumes for data persistence
# ============================================================================
volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  diagnostic_api_logs:
    driver: local

# ============================================================================
# SERVICES
# ============================================================================
services:
  # --------------------------------------------------------------------------
  # Postgres + pgvector - Primary database & vector store
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:${POSTGRES_VERSION:-0.7.4-pg15}
    container_name: stf-postgres
    restart: unless-stopped
    networks:
      - stf-internal
    ports:
      - "${BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stf_diagnosis}
      POSTGRES_USER: ${POSTGRES_USER:-stf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stf_user} -d ${POSTGRES_DB:-stf_diagnosis}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-100} -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=2621kB -c min_wal_size=1GB -c max_wal_size=4GB


  # --------------------------------------------------------------------------
  # Ollama - Local LLM inference runtime
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.17.4
    container_name: stf-ollama
    restart: unless-stopped
    networks:
      - stf-internal
    ports:
      - "${BIND_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_FLASH_ATTENTION: "true"
    # GPU access is environment-specific:
    #   - Docker: use docker-compose.gpu-docker.yml overlay
    #   - Podman (PolyU): uses direct /dev/nvidia* device passthrough
    #     in docker-compose.polyu.yml

  # --------------------------------------------------------------------------
  # Diagnostic API - FastAPI backend
  # --------------------------------------------------------------------------
  diagnostic-api:
    build:
      context: ..
      dockerfile: diagnostic_api/Dockerfile
    image: stf-diagnostic-api:${DIAGNOSTIC_API_VERSION:-0.1.0}
    container_name: stf-diagnostic-api
    restart: unless-stopped
    networks:
      - stf-internal
    ports:
      - "${BIND_HOST:-127.0.0.1}:${DIAGNOSTIC_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      # Database
      DB_HOST: ${POSTGRES_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_NAME: ${APP_DB_NAME:-stf_diagnosis}
      DB_USER: ${APP_DB_USER:-stf_app_user}
      DB_PASSWORD: ${APP_DB_PASSWORD}

      # LLM Configuration
      LLM_ENDPOINT: ${OLLAMA_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${OLLAMA_DEFAULT_MODEL:-qwen3.5:9b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      VISION_MODEL: ${VISION_MODEL:-llava}

      # Premium LLM Configuration — OpenRouter (opt-in)
      PREMIUM_LLM_ENABLED: ${PREMIUM_LLM_ENABLED:-false}
      PREMIUM_LLM_API_KEY: ${PREMIUM_LLM_API_KEY:-}
      PREMIUM_LLM_BASE_URL: ${PREMIUM_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      PREMIUM_LLM_MODEL: ${PREMIUM_LLM_MODEL:-anthropic/claude-sonnet-4.6}
      PREMIUM_LLM_CURATED_MODELS: ${PREMIUM_LLM_CURATED_MODELS:-anthropic/claude-opus-4.6,anthropic/claude-sonnet-4.6,google/gemini-3.1-pro-preview,google/gemini-3-flash-preview,openai/gpt-5.2,openai/gpt-5-mini,deepseek/deepseek-v3.2,deepseek/deepseek-chat,qwen/qwen3.5-plus-02-15,qwen/qwen3.5-flash-02-23}


      # Logging
      LOG_LEVEL: ${DIAGNOSTIC_API_LOG_LEVEL:-INFO}
      LOG_FORMAT: ${DIAGNOSTIC_API_LOG_FORMAT:-json}
      LOG_FILE: ${DIAGNOSTIC_API_LOG_FILE:-/app/logs/diagnostic_api.log}

      # Security
      STRICT_MODE: ${DIAGNOSTIC_API_STRICT_MODE:-true}
      ALLOW_EXTERNAL_APIS: ${DIAGNOSTIC_API_ALLOW_EXTERNAL_APIS:-false}

      # Authentication
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
    volumes:
      - diagnostic_api_logs:/app/logs
    # Note: easyocr runs on CPU (pip torch is CPU-only in slim image).
    # For GPU OCR, switch to a CUDA base image and install torch+cu121.
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # OBD UI - Next.js expert diagnostic frontend
  # --------------------------------------------------------------------------
  obd-ui:
    build:
      context: ../obd-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${BIND_HOST:-127.0.0.1}:${DIAGNOSTIC_API_PORT:-8000}
    image: stf-obd-ui:${OBD_UI_VERSION:-0.1.0}
    container_name: stf-obd-ui
    restart: unless-stopped
    networks:
      - stf-internal
    ports:
      - "${BIND_HOST:-127.0.0.1}:${OBD_UI_PORT:-3001}:3001"
    depends_on:
      diagnostic-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://${BIND_HOST:-127.0.0.1}:${DIAGNOSTIC_API_PORT:-8000}
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
