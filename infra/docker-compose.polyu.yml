# ============================================================================
# STF AI Diagnosis Platform - PolyU Server Override (Podman + CDI GPU)
# Author: Li-Ta Hsu
# Date: March 2026
# ============================================================================
# Usage:
#   podman-compose -f docker-compose.yml -f docker-compose.polyu.yml up -d --build
#
# This override file adapts the base docker-compose.yml for the PolyU GPU
# server which runs Podman (not Docker) with NVIDIA CDI for GPU passthrough.
#
# Changes from base:
#   - Ollama: CDI GPU device mapping (replaces Docker deploy.resources)
#   - Nginx: reverse proxy as sole external ingress on port 80
#   - obd-ui: NEXT_PUBLIC_API_URL set to empty (same-origin via Nginx)
#   - All app ports bound to 127.0.0.1 (only Nginx exposed externally)
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Ollama - Add CDI GPU passthrough for Podman
  # --------------------------------------------------------------------------
  # The base file's deploy.resources.reservations section is Docker-specific
  # and is silently ignored by podman-compose.  CDI device mapping below
  # grants the container access to all NVIDIA GPUs.
  # Prerequisite: sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
  ollama:
    devices:
      - nvidia.com/gpu=all

  # --------------------------------------------------------------------------
  # obd-ui - Override API URL for Nginx same-origin proxying
  # --------------------------------------------------------------------------
  # When behind Nginx, the browser sends API requests to the same origin.
  # Empty NEXT_PUBLIC_API_URL makes fetch() use relative paths (e.g. /v2/obd).
  obd-ui:
    build:
      context: ../obd-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    environment:
      NEXT_PUBLIC_API_URL: ""

  # --------------------------------------------------------------------------
  # Nginx - Sole external ingress gateway
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: stf-nginx
    restart: unless-stopped
    networks:
      - stf-internal
    ports:
      - "0.0.0.0:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params_api.conf:/etc/nginx/proxy_params_api.conf:ro
    depends_on:
      obd-ui:
        condition: service_healthy
      diagnostic-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
