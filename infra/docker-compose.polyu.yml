# ============================================================================
# STF AI Diagnosis Platform - PolyU Server Override (Podman + GPU)
# Author: Li-Ta Hsu
# Date: March 2026
# ============================================================================
# Usage:
#   podman-compose -f docker-compose.yml -f docker-compose.polyu.yml up -d --build
#
# This override file adapts the base docker-compose.yml for the PolyU GPU
# server which runs Podman (not Docker) with NVIDIA GPU device passthrough.
#
# Changes from base:
#   - Ollama: direct device passthrough (Podman 3.x compatible)
#   - Nginx: reverse proxy as sole external ingress on port 80
#   - obd-ui: NEXT_PUBLIC_API_URL set to empty (same-origin via Nginx)
#   - All app ports bound to 127.0.0.1 (only Nginx exposed externally)
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Ollama - GPU passthrough via direct device mapping
  # --------------------------------------------------------------------------
  # Podman 3.4 does not support CDI (nvidia.com/gpu=all).  Instead, pass
  # through the NVIDIA device files directly.  The base file's
  # deploy.resources.reservations section is Docker-specific and is silently
  # ignored by podman-compose.
  ollama:
    # Neutralize the base file's deploy.resources.reservations.devices
    # (Docker-specific GPU syntax that podman-compose 1.x mistakenly
    # converts to CDI devices).  Override with empty list.
    deploy:
      resources:
        reservations:
          devices: []
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidia1:/dev/nvidia1
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_FLASH_ATTENTION: "true"

  # --------------------------------------------------------------------------
  # obd-ui - Override API URL for Nginx same-origin proxying
  # --------------------------------------------------------------------------
  # When behind Nginx, the browser sends API requests to the same origin.
  # Empty NEXT_PUBLIC_API_URL makes fetch() use relative paths (e.g. /v2/obd).
  obd-ui:
    build:
      context: ../obd-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    environment:
      NEXT_PUBLIC_API_URL: ""

  # --------------------------------------------------------------------------
  # Nginx - Sole external ingress gateway
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: stf-nginx
    restart: unless-stopped
    networks:
      - stf-internal
    ports:
      - "0.0.0.0:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params_api.conf:/etc/nginx/proxy_params_api.conf:ro
    depends_on:
      - obd-ui
      - diagnostic-api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
