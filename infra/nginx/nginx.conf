# ============================================================================
# STF AI Diagnosis Platform - Nginx Reverse Proxy
# Author: Li-Ta Hsu
# Date: March 2026
# ============================================================================
# Sole external ingress gateway for the PolyU server deployment.
# Proxies frontend (obd-ui) and API (diagnostic-api) behind a single port.
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version in headers and error pages
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # File upload limit (OBD logs, PDF manuals)
    client_max_body_size 100m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Rate limiting for auth endpoints (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Upstream definitions
    # Use 127.0.0.1 for Podman host-network mode (no container DNS).
    # For Docker with bridge networking, replace with container names.
    upstream frontend {
        server 127.0.0.1:3001;
    }

    upstream api {
        server 127.0.0.1:8001;
    }

    server {
        listen 8080;
        server_name _;

        # ── Security headers ─────────────────────────────────────────
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ── API routes ────────────────────────────────────────────────
        # FastAPI endpoints: /v1/*, /v2/*, /auth/*, /health.
        # Must be listed before the catch-all frontend location.
        # Note: /docs, /openapi.json, /redoc are NOT proxied externally.
        # Access them via SSH tunnel: ssh -L 8001:127.0.0.1:8001 polyu-gpu
        location /v1/ {
            proxy_pass http://api;
            include /etc/nginx/proxy_params_api.conf;
        }

        location /v2/ {
            proxy_pass http://api;
            include /etc/nginx/proxy_params_api.conf;

            # SSE streaming support for /v2/obd/{id}/diagnose
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 120s;
            add_header X-Accel-Buffering no always;
        }

        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api;
            include /etc/nginx/proxy_params_api.conf;
        }

        location = /health {
            proxy_pass http://api;
            include /etc/nginx/proxy_params_api.conf;
        }

        # ── Manual viewer (static HTML + markdown data) ────────────────
        location = /manuals {
            return 301 /manuals/;
        }

        location /manuals/ {
            alias /srv/manuals/;
            index index.html;
        }

        location /manuals/data/ {
            alias /app/data/manuals/;
            # Public: service manual docs are non-confidential.
            # autoindex enables the viewer JS to discover .md files.
            autoindex on;
            disable_symlinks on;
            add_header Cache-Control "public, max-age=3600";
            # Repeat security headers (Nginx add_header in child
            # blocks replaces, not inherits from, parent).
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
        }

        # ── Frontend (catch-all) ──────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
